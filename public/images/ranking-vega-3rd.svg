<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for Vega (pale blue star) -->
    <radialGradient id="vegaGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f8f9ff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#e1f5fe;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#81d4fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0277bd;stop-opacity:0.8" />
    </radialGradient>
    
    <!-- Bronze gradient for 3rd place -->
    <radialGradient id="bronzeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e65100;stop-opacity:0.9" />
    </radialGradient>
    
    <!-- Soft glow for Vega -->
    <filter id="vegaGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Bronze glow for 3rd place -->
    <filter id="bronzeGlow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background cosmic circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" opacity="0.15"/>
  
  <!-- Bronze rays for 3rd place -->
  <g filter="url(#bronzeGlow)" opacity="0.6">
    <line x1="100" y1="30" x2="100" y2="42" stroke="url(#bronzeGradient)" stroke-width="2"/>
    <line x1="120" y1="35" x2="118" y2="47" stroke="url(#bronzeGradient)" stroke-width="1.8"/>
    <line x1="80" y1="35" x2="82" y2="47" stroke="url(#bronzeGradient)" stroke-width="1.8"/>
    <line x1="138" y1="58" x2="133" y2="70" stroke="url(#bronzeGradient)" stroke-width="1.5"/>
    <line x1="62" y1="58" x2="67" y2="70" stroke="url(#bronzeGradient)" stroke-width="1.5"/>
    <line x1="152" y1="82" x2="145" y2="90" stroke="url(#bronzeGradient)" stroke-width="1.2"/>
    <line x1="48" y1="82" x2="55" y2="90" stroke="url(#bronzeGradient)" stroke-width="1.2"/>
  </g>
  
  <!-- Vega main star -->
  <g filter="url(#vegaGlow)">
    <circle cx="100" cy="100" r="32" fill="url(#vegaGradient)"/>
    
    <!-- Gentle star spikes -->
    <line x1="100" y1="45" x2="100" y2="155" stroke="#f8f9ff" stroke-width="2" opacity="0.8"/>
    <line x1="45" y1="100" x2="155" y2="100" stroke="#f8f9ff" stroke-width="2" opacity="0.8"/>
    <line x1="60" y1="60" x2="140" y2="140" stroke="#e1f5fe" stroke-width="1.5" opacity="0.6"/>
    <line x1="140" y1="60" x2="60" y2="140" stroke="#e1f5fe" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Pale blue core -->
  <circle cx="100" cy="100" r="10" fill="#f0f8ff" opacity="0.9"/>
  
  <!-- 3rd place indicator -->
  <g transform="translate(100,160)">
    <circle cx="0" cy="0" r="15" fill="url(#bronzeGradient)" filter="url(#bronzeGlow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial Black" font-size="16" fill="#ffffff" font-weight="bold">3</text>
  </g>
  
  <!-- Gentle floating particles around Vega -->
  <g opacity="0.6">
    <circle cx="70" cy="70" r="1.5" fill="#f8f9ff">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="70" r="1.2" fill="#e1f5fe">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="130" r="1.8" fill="#81d4fa">
      <animate attributeName="opacity" values="0.4;0.6;0.4" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="130" r="1.3" fill="#f8f9ff">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3.1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
