<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for Sirius (blue-white bright star) -->
    <radialGradient id="siriusGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#90caf9;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2196f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:0.9" />
    </radialGradient>
    
    <!-- Silver gradient for 2nd place -->
    <radialGradient id="silverGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9e9e9e;stop-opacity:0.9" />
    </radialGradient>
    
    <!-- Bright glow for Sirius -->
    <filter id="siriusGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Silver glow for 2nd place -->
    <filter id="silverGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background cosmic circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" opacity="0.2"/>
  
  <!-- Silver rays for 2nd place -->
  <g filter="url(#silverGlow)" opacity="0.7">
    <line x1="100" y1="25" x2="100" y2="40" stroke="url(#silverGradient)" stroke-width="2.5"/>
    <line x1="125" y1="32" x2="122" y2="45" stroke="url(#silverGradient)" stroke-width="2"/>
    <line x1="75" y1="32" x2="78" y2="45" stroke="url(#silverGradient)" stroke-width="2"/>
    <line x1="145" y1="55" x2="138" y2="68" stroke="url(#silverGradient)" stroke-width="1.8"/>
    <line x1="55" y1="55" x2="62" y2="68" stroke="url(#silverGradient)" stroke-width="1.8"/>
    <line x1="162" y1="78" x2="152" y2="88" stroke="url(#silverGradient)" stroke-width="1.5"/>
    <line x1="38" y1="78" x2="48" y2="88" stroke="url(#silverGradient)" stroke-width="1.5"/>
  </g>
  
  <!-- Sirius main star -->
  <g filter="url(#siriusGlow)">
    <circle cx="100" cy="100" r="38" fill="url(#siriusGradient)"/>
    
    <!-- Brilliant star spikes -->
    <line x1="100" y1="35" x2="100" y2="165" stroke="#e3f2fd" stroke-width="2.5" opacity="0.9"/>
    <line x1="35" y1="100" x2="165" y2="100" stroke="#e3f2fd" stroke-width="2.5" opacity="0.9"/>
    <line x1="53" y1="53" x2="147" y2="147" stroke="#90caf9" stroke-width="1.8" opacity="0.7"/>
    <line x1="147" y1="53" x2="53" y2="147" stroke="#90caf9" stroke-width="1.8" opacity="0.7"/>
  </g>
  
  <!-- Bright white core -->
  <circle cx="100" cy="100" r="12" fill="#ffffff" opacity="0.95"/>
  
  <!-- 2nd place indicator -->
  <g transform="translate(100,160)">
    <circle cx="0" cy="0" r="16" fill="url(#silverGradient)" filter="url(#silverGlow)"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial Black" font-size="18" fill="#1a1a2e" font-weight="bold">2</text>
  </g>
  
  <!-- Twinkling particles around Sirius -->
  <g opacity="0.8">
    <circle cx="65" cy="65" r="1.8" fill="#e3f2fd">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="135" cy="65" r="1.3" fill="#90caf9">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="65" cy="135" r="2" fill="#2196f3">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="135" cy="135" r="1.5" fill="#e3f2fd">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
