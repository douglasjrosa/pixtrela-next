<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for Antares (red supergiant) -->
    <radialGradient id="antaresGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#ff4757;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#c44569;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b2635;stop-opacity:0.9" />
    </radialGradient>
    
    <!-- Gradient for crown effect -->
    <radialGradient id="crownGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffb300;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:0.8" />
    </radialGradient>
    
    <!-- Glow filter for 1st place effect -->
    <filter id="firstPlaceGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong glow for Antares -->
    <filter id="antaresGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background cosmic circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" opacity="0.3"/>
  
  <!-- Crown rays for 1st place -->
  <g filter="url(#firstPlaceGlow)" opacity="0.8">
    <line x1="100" y1="20" x2="100" y2="40" stroke="url(#crownGradient)" stroke-width="3"/>
    <line x1="130" y1="25" x2="125" y2="43" stroke="url(#crownGradient)" stroke-width="2.5"/>
    <line x1="70" y1="25" x2="75" y2="43" stroke="url(#crownGradient)" stroke-width="2.5"/>
    <line x1="155" y1="45" x2="145" y2="60" stroke="url(#crownGradient)" stroke-width="2"/>
    <line x1="45" y1="45" x2="55" y2="60" stroke="url(#crownGradient)" stroke-width="2"/>
    <line x1="170" y1="70" x2="157" y2="82" stroke="url(#crownGradient)" stroke-width="1.5"/>
    <line x1="30" y1="70" x2="43" y2="82" stroke="url(#crownGradient)" stroke-width="1.5"/>
  </g>
  
  <!-- Antares main star -->
  <g filter="url(#antaresGlow)">
    <circle cx="100" cy="100" r="45" fill="url(#antaresGradient)"/>
    
    <!-- Star spikes for red supergiant effect -->
    <line x1="100" y1="25" x2="100" y2="175" stroke="#ff6b35" stroke-width="3" opacity="0.8"/>
    <line x1="25" y1="100" x2="175" y2="100" stroke="#ff6b35" stroke-width="3" opacity="0.8"/>
    <line x1="46" y1="46" x2="154" y2="154" stroke="#ff4757" stroke-width="2" opacity="0.6"/>
    <line x1="154" y1="46" x2="46" y2="154" stroke="#ff4757" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- Central bright core -->
  <circle cx="100" cy="100" r="15" fill="#ff8a80" opacity="0.9"/>
  
  <!-- 1st place indicator -->
  <g transform="translate(100,160)">
    <circle cx="0" cy="0" r="18" fill="url(#crownGradient)" filter="url(#firstPlaceGlow)"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial Black" font-size="20" fill="#1a1a2e" font-weight="bold">1</text>
  </g>
  
  <!-- Pulsing particles around Antares -->
  <g opacity="0.7">
    <circle cx="60" cy="60" r="2" fill="#ff6b35">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="60" r="1.5" fill="#ff4757">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="140" r="2.2" fill="#c44569">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="140" cy="140" r="1.8" fill="#ff6b35">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
